services:

  ticket-caddy-dev:
    image: caddy:2.10.2-alpine
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      ticket-gatewayapi-dev:
        condition: service_started
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - ticket-booking-network

  ticket-mysql-dev:
    image: mysql:8.4.6
    ports:
      - 3306:3306
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - ./infrastructure/mysql/init-db-user.sh:/docker-entrypoint-initdb.d/init-db-user.sh
      - db-data:/var/lib/mysql
    networks:
      - ticket-booking-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ticket-react-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: ticket-react-dev
    ports:
      - 5173:5173
    environment:
      - PUBLIC_URL=/
      - VITE_API_BASE_URL=${API_SERVER_URL_LOCAL}
    networks:
      - ticket-booking-network
    volumes:
      - node_modules:/app/node_modules # to avoid overwriting node_modules
      - ./frontend:/app
  
  ticket-gatewayapi-dev:
    build:
      context: ./backend
      dockerfile: gatewayapi/Dockerfile.dev
    image: ticket-gatewayapi-dev
    working_dir: /app/gatewayapi
    expose: [8000]
    command: ["mvn", "-Pdev", "spring-boot:run"]
    environment:
      SERVER_PORT: "8000"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CATALOG_BASE_URL: "ticket-catalog-service-dev:8080"
      CART_BASE_URL: "ticket-cart-service-dev:8081"
      ORDER_BASE_URL: "ticket-order-service-dev:8082"
    volumes:
      - ./backend:/app
      - ${HOME}/.m2:/root/.m2
    networks:
      - ticket-booking-network
      
  ticket-catalog-service-dev:
    build:
      context: ./backend
      dockerfile: CatalogService/Dockerfile.dev
    image: ticket-catalog-service-dev
    # working_dir: /app/CatalogService
    expose: [8080]
    command: ["dotnet", "watch", "run", "--urls", "http://0.0.0.0:8080"]
    # command: ["sh", "-c", "tail -f /dev/null"]
    depends_on:
      ticket-mysql-dev:
        condition: service_healthy
      ticket-kafka-broker-dev:
        condition: service_healthy
      ticket-kafka-init-dev:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DOTNET_WATCH_SUPPRESS_LAUNCH_BROWSER: "true"
      ConnectionStrings__CatalogDb: ${MYSQL_CONNECTION_STRING_CATALOG_DEV}
      SERVER_PORT: "8080"
      API_SERVER_URL: ${API_SERVER_URL_LOCAL}
      KAFKA_BOOTSTRAP_SERVERS: "ticket-kafka-broker-dev:29092"
    volumes:
      - ./backend/CatalogService:/app/CatalogService
      # - ./backend:/app
      # - ${HOME}/.m2:/root/.m2
    networks:
      - ticket-booking-network

  ticket-cart-service-dev:
    build:
      context: ./backend
      dockerfile: cart-service/Dockerfile.dev
    image: ticket-cart-service-dev
    working_dir: /app/cart-service
    expose: [8081]
    command: ["mvn", "spring-boot:run"]
    depends_on:
      ticket-redis-dev:
        condition: service_started
      ticket-kafka-broker-dev:
        condition: service_healthy
      ticket-kafka-init-dev:
        condition: service_completed_successfully
    environment:
      SERVER_PORT: "8081"
      API_SERVER_URL: ${API_SERVER_URL_LOCAL}
      CATALOG_BASE_URL: "ticket-catalog-service-dev:8080"
      KAFKA_BOOTSTRAP_SERVERS: "ticket-kafka-broker-dev:29092"
      REDIS_HOST: ticket-redis-dev
      REDIS_PORT: 6379
    volumes:
      - ./backend:/app
      - ${HOME}/.m2:/root/.m2
    networks:
      - ticket-booking-network

  ticket-order-service-dev:
    build:
      context: ./backend
      dockerfile: order-service/Dockerfile.dev
    image: ticket-order-service-dev
    working_dir: /app/order-service
    expose: [8082]
    command: ["mvn", "spring-boot:run"]
    depends_on:
      ticket-mysql-dev:
        condition: service_healthy
      ticket-kafka-broker-dev:
        condition: service_healthy
      ticket-kafka-init-dev:
        condition: service_completed_successfully
    environment:
      SERVER_PORT: "8082"
      API_SERVER_URL: ${API_SERVER_URL_LOCAL}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL_ORDER_DEV}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: "ticket-kafka-broker-dev:29092"
    volumes:
      - ./backend:/app
      - ${HOME}/.m2:/root/.m2
    networks:
      - ticket-booking-network

  ticket-zookeeper-dev:
    image: confluentinc/cp-zookeeper:7.9.3
    expose: [2181]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 3000
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
      ZOOKEEPER_LOG4J_LOGGERS: "org.apache.zookeeper.server.NIOServerCnxn=WARN"
    networks:
      - ticket-booking-network
    healthcheck:
      test: ["CMD", "sh", "-c", "echo 'srvr' | nc localhost 2181 | grep -q 'Mode:'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ticket-kafka-broker-dev:
    image: confluentinc/cp-kafka:7.9.3
    expose: [29092]
    depends_on:
      ticket-zookeeper-dev:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'ticket-zookeeper-dev:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://ticket-kafka-broker-dev:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
      KAFKA_LOG4J_LOGGERS: 'kafka=WARN,kafka.controller=WARN,kafka.log.LogCleaner=WARN,state.change.logger=WARN,kafka.producer.async.DefaultEventHandler=WARN,o.a.kafka.common.utils.AppInfoParser=WARN'
    networks:
      - ticket-booking-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ticket-kafka-init-dev:
    image: confluentinc/cp-kafka:7.9.3
    depends_on:
      ticket-kafka-broker-dev:
        condition: service_healthy
    volumes:
      - ./infrastructure/kafka/create-topics.sh:/create-topics.sh:ro
    entrypoint: ["/bin/bash", "/create-topics.sh"]
    environment:
      KAFKA_BROKER: ticket-kafka-broker-dev:29092
    networks:
      - ticket-booking-network

  ticket-redis-dev:
    image: redis:8.2.1-alpine
    expose: [6379]
    networks:
      - ticket-booking-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
      
networks:
  ticket-booking-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  db-data:
  node_modules:
