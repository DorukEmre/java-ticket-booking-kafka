
x-restart: &default-restart
  restart: unless-stopped

services:

  ticket-caddy:
    <<: *default-restart
    image: caddy:2.10.2-alpine
    # ports:
    #   - "80:80"
    #   - "443:443"
    depends_on:
      ticket-gatewayapi:
        condition: service_started
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/usr/share/caddy/react:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - ticket-booking-network
      - proxy-network   # shared external network

  ticket-mysql:
    <<: *default-restart
    image: mysql:8.4.6
    expose: [3306]
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - ./infrastructure/mysql/init-db-user.sh:/docker-entrypoint-initdb.d/init-db-user.sh
      - db-data:/var/lib/mysql
    networks:
      - ticket-booking-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ticket-gatewayapi:
    <<: *default-restart
    build:
      context: ./backend/gatewayapi
      dockerfile: Dockerfile.prod
    image: ticket-gatewayapi
    working_dir: /app
    expose: [8000]
    environment:
      SERVER_PORT: "8000"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CATALOG_BASE_URL: "ticket-catalog-service:8080"
      CART_BASE_URL: "ticket-cart-service:8081"
      ORDER_BASE_URL: "ticket-order-service:8082"
    networks:
      - ticket-booking-network

  ticket-catalog-service:
    <<: *default-restart
    build:
      context: ./backend
      dockerfile: CatalogService/Dockerfile.prod
    image: ticket-catalog-service
    # working_dir: /app
    expose: [8080]
    depends_on:
      ticket-mysql:
        condition: service_healthy
      ticket-kafka-broker:
        condition: service_healthy
      ticket-kafka-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__CatalogDb: ${MYSQL_CONNECTION_STRING_CATALOG_PROD}
      SERVER_PORT: "8080"
      API_SERVER_URL: ${API_SERVER_URL_PROD}
      KAFKA_BOOTSTRAP_SERVERS: "ticket-kafka-broker:29092"
    networks:
      - ticket-booking-network

  ticket-cart-service:
    <<: *default-restart
    build:
      context: ./backend/cart-service
      dockerfile: Dockerfile.prod
    image: ticket-cart-service
    working_dir: /app
    expose: [8081]
    depends_on:
      ticket-redis:
        condition: service_started
      ticket-kafka-broker:
        condition: service_healthy
      ticket-kafka-init:
        condition: service_completed_successfully
    environment:
      SERVER_PORT: "8081"
      API_SERVER_URL: ${API_SERVER_URL_PROD}
      CATALOG_BASE_URL: "ticket-catalog-service:8080"
      KAFKA_BOOTSTRAP_SERVERS: "ticket-kafka-broker:29092"
      REDIS_HOST: ticket-redis
      REDIS_PORT: 6379
    networks:
      - ticket-booking-network

  ticket-order-service:
    <<: *default-restart
    build:
      context: ./backend/order-service
      dockerfile: Dockerfile.prod
    image: ticket-order-service
    working_dir: /app
    expose: [8082]
    depends_on:
      ticket-mysql:
        condition: service_healthy
      ticket-kafka-broker:
        condition: service_healthy
      ticket-kafka-init:
        condition: service_completed_successfully
    environment:
      SERVER_PORT: "8082"
      API_SERVER_URL: ${API_SERVER_URL_PROD}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL_ORDER_PROD}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: "ticket-kafka-broker:29092"
    networks:
      - ticket-booking-network

  ticket-zookeeper:
    <<: *default-restart
    image: confluentinc/cp-zookeeper:7.9.3
    expose: [2181]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 3000
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
      ZOOKEEPER_LOG4J_LOGGERS: "org.apache.zookeeper.server.NIOServerCnxn=WARN"
    networks:
      - ticket-booking-network
    healthcheck:
      test: ["CMD", "sh", "-c", "echo 'srvr' | nc localhost 2181 | grep -q 'Mode:'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ticket-kafka-broker:
    <<: *default-restart
    image: confluentinc/cp-kafka:7.9.3
    expose: [29092]
    depends_on:
      ticket-zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'ticket-zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://ticket-kafka-broker:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
      KAFKA_LOG4J_LOGGERS: 'kafka=WARN,kafka.controller=WARN,kafka.log.LogCleaner=WARN,state.change.logger=WARN,kafka.producer.async.DefaultEventHandler=WARN,o.a.kafka.common.utils.AppInfoParser=WARN'
    networks:
      - ticket-booking-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ticket-kafka-init:
    image: confluentinc/cp-kafka:7.9.3
    depends_on:
      ticket-kafka-broker:
        condition: service_healthy
    volumes:
      - ./infrastructure/kafka/create-topics.sh:/create-topics.sh:ro
    entrypoint: ["/bin/bash", "/create-topics.sh"]
    environment:
      KAFKA_BROKER: ticket-kafka-broker:29092
    networks:
      - ticket-booking-network

  ticket-redis:
    <<: *default-restart
    image: redis:8.2.1-alpine
    expose: [6379]
    networks:
      - ticket-booking-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
      
networks:
  ticket-booking-network:
    driver: bridge
  proxy-network:
    external: true

volumes:
  caddy_data:
  caddy_config:
  db-data:
