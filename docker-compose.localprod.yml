
services:
  ticket-caddy:
    ports:
      - "5443:5443"
      - "8443:8443"
    volumes:
      - ./Caddyfile.localprod:/etc/caddy/Caddyfile:ro
  
  ticket-catalog-service:
    environment:
      API_SERVER_URL: ${API_SERVER_URL_LOCALPROD}

  ticket-cart-service:
    environment:
      API_SERVER_URL: ${API_SERVER_URL_LOCALPROD}

  ticket-order-service:
    environment:
      API_SERVER_URL: ${API_SERVER_URL_LOCALPROD}
